[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1920x1080x24
autorestart=true
priority=100

[program:xfce4]
command=/bin/bash -c "sleep 2 && export DISPLAY=:1 && export HOME=/root && export USER=root && /usr/bin/startxfce4"
environment=DISPLAY=":1",HOME="/root",USER="root"
autorestart=true
priority=200
stdout_logfile=/var/log/xfce4.log
stderr_logfile=/var/log/xfce4_error.log

[program:x11vnc]
command=/bin/bash -c "sleep 6 && /usr/bin/x11vnc -display :1 -nopw -listen 0.0.0.0 -xkb -forever -shared -rfbport 5900 -o /var/log/x11vnc.log"
environment=DISPLAY=":1"
autorestart=true
priority=300

[program:novnc]
command=/bin/bash -c "sleep 8 && /usr/local/bin/websockify --web=/opt/novnc 6080 localhost:5900"
autorestart=true
priority=400
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc_error.log

[program:ros_demo]
command=/bin/bash -c "sleep 12 && source /opt/ros/noetic/setup.bash && source /workspace/catkin_ws/devel/setup.bash && export DISPLAY=:1 && export ROS_MASTER_URI=http://localhost:11311 && roslaunch smart_arm_demo pick_place.launch"
environment=DISPLAY=":1",ROS_MASTER_URI="http://localhost:11311",ROS_HOSTNAME="localhost"
autorestart=true
priority=500
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
user=root
startretries=3

